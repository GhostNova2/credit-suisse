<body>

<script>checkSession();</script>
<div id="app"></div>

<script>
const content = `
    <div class="page-title">Mes cartes</div>
    <div class="page-subtitle">Gérez vos cartes bancaires premium et leurs limites</div>

    <div class="grid-3" style="margin-top:28px">
        <div class="bank-card">
            <div style="display:flex;justify-content:space-between;align-items:start">
                <div class="card-chip"></div>
                <span style="font-size:12px;opacity:0.7">VISA Infinite</span>
                <button onclick="showCardAccessBlocked()" title="Afficher les données de carte" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <div class="card-number">•••• •••• •••• 4829</div>
            <div class="card-meta">
                <div>TITULAIRE<strong>${BANK.clientName.toUpperCase()}</strong></div>
                <div>EXPIRE<strong>09/28</strong></div>
            </div>
        </div>

        <div class="bank-card gold">
            <div style="display:flex;justify-content:space-between;align-items:start">
                <div class="card-chip"></div>
                <span style="font-size:12px;opacity:0.7">Mastercard World Elite</span>
                <button onclick="showCardAccessBlocked()" title="Afficher les données de carte" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <div class="card-number">•••• •••• •••• 7156</div>
            <div class="card-meta">
                <div>TITULAIRE<strong>${BANK.clientName.toUpperCase()}</strong></div>
                <div>EXPIRE<strong>03/29</strong></div>
            </div>
        </div>

        <div class="bank-card platinum">
            <div style="display:flex;justify-content:space-between;align-items:start">
                <div class="card-chip"></div>
                <span style="font-size:12px;opacity:0.7">Carte virtuelle</span>
                <button onclick="showCardAccessBlocked()" title="Afficher les données de carte" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);color:white;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
            <div class="card-number">•••• •••• •••• 9031</div>
            <div class="card-meta">
                <div>TITULAIRE<strong>${BANK.clientName.toUpperCase()}</strong></div>
                <div>EXPIRE<strong>06/26</strong></div>
            </div>
        </div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3 style="margin:0 0 16px;color:var(--primary)">Limites & contrôles</h3>
            <div class="tx-item">
                <div class="tx-info"><strong>Plafond paiement journalier</strong><span>Carte principale</span></div>
                <div class="tx-amount">CHF 10 000</div>
            </div>
            <div class="tx-item">
                <div class="tx-info"><strong>Plafond retrait ATM</strong><span>Carte principale</span></div>
                <div class="tx-amount">CHF 2 000</div>
            </div>
            <div class="tx-item">
                <div class="tx-info"><strong>Paiements en ligne</strong><span>Carte virtuelle</span></div>
                <div class="tx-amount"><span class="badge badge-success">Activé</span></div>
            </div>
            <div class="tx-item">
                <div class="tx-info"><strong>Paiements à l'étranger</strong><span>Toutes cartes</span></div>
                <div class="tx-amount"><span class="badge badge-success">Activé</span></div>
            </div>
            <button class="action-btn outline" style="width:100%;margin-top:16px" onclick="alert('Demande de modification envoyée à votre gestionnaire.')">Modifier les limites</button>
        </div>

        <div class="card">
            <h3 style="margin:0 0 16px;color:var(--primary)">Dernières opérations carte</h3>
            <ul class="tx-list">
                <li class="tx-item">
                    ${txIcon('shop')}
                    <div class="tx-info"><strong>Galeries Lafayette</strong><span>18 juin 2020 — Carte ••4829</span></div>

                <li class="tx-item">
                    ${txIcon('store')}
                    <div class="tx-info"><strong>Starbucks Genève</strong><span>07 avril 2020 — Carte ••4829</span></div>
                    <div class="tx-amount negative">– CHF 8.50</div>
                </li>
                <li class="tx-item">
                    ${txIcon('plane')}
                    <div class="tx-info"><strong>Swiss International Air Lines</strong><span>05 avril 2020 — Carte ••7156</span></div>
                    <div class="tx-amount negative">– CHF 890</div>
                </li>
                <li class="tx-item">
                    ${txIcon('building')}
                    <div class="tx-info"><strong>Hôtel D'Angleterre</strong><span>12 mars 2020 — Carte ••7156</span></div>
                    <div class="tx-amount negative">– CHF 1 420</div>

            </ul>
        </div>
    </div>

    <div class="card" style="margin-top:24px;text-align:center;padding:32px">
        <h3 style="color:var(--primary)">Créer une carte virtuelle</h3>
        <p style="color:var(--text-muted);max-width:400px;margin:0 auto 20px">Générez une carte à usage unique pour vos achats en ligne en toute sécurité.</p>
        <button class="action-btn accent" onclick="createVirtualCard()">+ Nouvelle carte virtuelle</button>
        <div class="success-msg" id="cardCreated" style="display:none;margin-top:16px">Demande transmise au gestionnaire.<br>Statut : Procédure en cours.</div>
    </div>
`;

document.getElementById('app').innerHTML = renderAppLayout('cards.html', content);

// --- Remplacement de la modale statique par une modale dynamique ---
// Suppression de l'injection statique et remplacement par une création dynamique
function showCardAccessBlocked() {
    // Si une modale similaire existe déjà, la retirer pour éviter doublons
    const existing = document.querySelector('.modal[data-bank-modal="card-blocked"]');
    if (existing) existing.remove();

    // Création de la structure de la modale en réutilisant les classes existantes
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.setAttribute('data-bank-modal', 'card-blocked');
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.innerHTML = `
        <div class="modal-box" style="max-width:420px;width:92%;text-align:center;padding:28px 24px;box-sizing:border-box">
            <div style="font-size:44px;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;justify-content:center">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2 style="
                margin:0 0 10px;
                font-size:22px;
                color:var(--primary);
                font-weight:700;
            ">
                Accès temporairement indisponible
            </h2>

            <p style="color:var(--text-muted);line-height:1.6;margin:0 0 20px;font-size:15px">
                Pour des raisons de sécurité, l’affichage complet des données de cette carte est momentanément suspendu.
            </p>

            <div style="
                background:var(--accent-soft);
                border-left:4px solid var(--accent);
                border-radius:12px;
                padding:14px 16px;
                margin-bottom:20px;
                text-align:center;
            ">
                <div style="
                    font-size:12px;
                    text-transform:uppercase;
                    letter-spacing:0.08em;
                    color:var(--text-muted);
                    margin-bottom:6px;
                ">
                    Statut actuel
                </div>

                <div style="
                    font-size:15px;
                    font-weight:700;
                    color:var(--primary);
                ">
                    Procédure en cours
                </div>
            </div>

            <button class="action-btn" id="bankModalCloseBtn" style="width:100%;margin-top:6px">Compris</button>
        </div>
    `;

    // Ajout au DOM
    document.body.appendChild(modal);

    // Gestion de la fermeture via le bouton
    const closeBtn = modal.querySelector('#bankModalCloseBtn');
    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            modal.remove();
        });
    }

    // Fermeture via clic sur l'arrière-plan (clic en dehors de .modal-box)
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
    });

    // Accessibilité : fermeture via Échap
    function onKey(e) {
        if (e.key === 'Escape') {
            modal.remove();
            document.removeEventListener('keydown', onKey);
        }
    }
    document.addEventListener('keydown', onKey);
}

// --- Fin modale dynamique ---

function createVirtualCard() {
    document.getElementById('cardCreated').style.display = 'block';
    const event = addBankEvent({
        prefix: 'CRD',
        type: 'Demande de carte virtuelle',
        title: 'Demande de carte virtuelle transmise',
        amount: 'Carte virtuelle',
        status: 'Procédure en cours',
        details: 'Demande transmise au gestionnaire',
        notification: 'Votre demande de carte virtuelle a été transmise au gestionnaire.',
        operationType: 'Carte bancaire',
        currentStep: 'Procédure en cours',
        icon: 'card'
    });
    sendCardEmail({
        reference: event.reference,
        card: event.amount,
        status: event.status
    });
}
</script>
</body>
</html>
