<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREDIT SUISSE – Investissements</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<script src="icons.js"></script>
<script src="app.js"></script>
<script>checkSession();</script>
<div id="app"></div>

<script>
const ASSETS = [
    { name: 'Global Equity ETF', price: 125.50, change: +2.3, type: 'ETF' },
    { name: 'Swiss Market Index Fund', price: 310.00, change: -0.8, type: 'Fonds' },
    { name: 'Emerging Markets ETF', price: 89.40, change: +1.5, type: 'ETF' },
    { name: 'Swiss Real Estate Fund', price: 156.20, change: +0.4, type: 'Fonds' },
    { name: 'Gold & Commodities ETF', price: 78.90, change: +3.1, type: 'ETF' },
    { name: 'Green Energy Portfolio', price: 42.15, change: +4.7, type: 'Thématique' }
];

const content = `
    <div class="page-title">Investissements</div>
    <div class="page-subtitle">Explorez et gérez votre portefeuille d'actifs</div>

    <div class="summary" style="margin-top:24px">
        <div class="box"><h4>Valeur du portefeuille</h4><div class="value">${formatEUR(100000)}</div></div>
        <div class="box"><h4>Performance YTD</h4><div class="value negative">– 3.1 %</div></div>
        <div class="box"><h4>Dividendes reçus</h4><div class="value positive">€ 2 840</div></div>
    </div>

    <div class="card" style="margin-top:28px">
        <h3 style="margin:0 0 20px;color:var(--primary)">Actifs disponibles</h3>
        <div class="grid-3" style="margin-top:0">
            ${ASSETS.map(a => `
                <div class="card" style="padding:20px">
                    <span class="badge badge-success" style="margin-bottom:10px">${a.type}</span>
                    <h4 style="margin:8px 0;color:var(--primary)">${a.name}</h4>
                    <div style="font-size:22px;font-weight:700">CHF ${a.price.toFixed(2)}</div>
                    <div class="${a.change >= 0 ? 'positive' : 'negative'}" style="font-size:13px;font-weight:600;margin:6px 0 14px">
                        ${a.change >= 0 ? '▲' : '▼'} ${Math.abs(a.change)} % aujourd'hui
                    </div>
                    <button class="action-btn" style="width:100%" onclick="openBuy('${a.name}', ${a.price})">Acheter</button>
                </div>
            `).join('')}
        </div>
    </div>

    <div class="table">
        <h3>Votre portefeuille</h3>
        <table id="portfolioTable">
            <tr><th>Actif</th><th>Quantité</th><th>Valeur (CHF)</th><th>Performance</th></tr>
            <tr><td>Global Equity ETF</td><td>120</td><td>CHF 15 060</td><td class="positive">+ 4.2 %</td></tr>
            <tr><td>Swiss Market Index Fund</td><td>85</td><td>CHF 26 350</td><td class="negative">– 1.8 %</td></tr>
        </table>
    </div>

    <div id="buyModal" class="modal">
        <div class="modal-box">
            <h3 id="assetName"></h3>
            <p style="color:var(--text-muted)">Prix unitaire : CHF <span id="assetPrice"></span></p>
            <div class="group">
                <label>Quantité</label>
                <input type="number" id="qty" placeholder="10" min="1">
            </div>
            <div class="group">
                <label>Compte de débit</label>
                <select><option>CH-104578-2 (Gestion pilotée)</option><option>CH-104578-1 (Exécution seule)</option></select>
            </div>
            <button class="action-btn" onclick="confirmBuy()" style="width:100%">Confirmer l'achat</button>
            <button class="action-btn outline" onclick="closeBuy()" style="width:100%;margin-top:10px">Annuler</button>
        </div>
    </div>
`;

document.getElementById('app').innerHTML = renderAppLayout('invest.html', content);

let selectedAsset = '', selectedPrice = 0;

function openBuy(name, price) {
    selectedAsset = name;
    selectedPrice = price;
    document.getElementById('assetName').innerText = name;
    document.getElementById('assetPrice').innerText = price.toFixed(2);
    document.getElementById('buyModal').style.display = 'block';
}

function closeBuy() {
    document.getElementById('buyModal').style.display = 'none';
}

function confirmBuy() {
    const qty = parseFloat(document.getElementById('qty').value);
    if (!qty || qty <= 0) return;
    const value = (qty * selectedPrice).toFixed(2);
    const table = document.getElementById('portfolioTable');
    const row = table.insertRow();
    row.insertCell(0).innerText = selectedAsset;
    row.insertCell(1).innerText = qty;
    row.insertCell(2).innerText = 'CHF ' + Number(value).toLocaleString('fr-FR');
    row.insertCell(3).innerHTML = '<span class="positive">+ 0.0 %</span>';
    closeBuy();

    const event = addBankEvent({
        prefix: 'INV',
        type: 'Demande d’investissement — ' + selectedAsset,
        title: 'Demande d’investissement reçue',
        amount: 'CHF ' + Number(value).toLocaleString('fr-FR'),
        status: 'Validation requise',
        details: `${qty} part(s) · validation par ${BANK.rmName}`,
        notification: 'Votre demande est en analyse portefeuille avant validation.',
        operationType: 'Investissement',
        currentStep: 'Analyse portefeuille',
        icon: 'invest'
    });
    sendInvestmentEmail({
        reference: event.reference,
        asset: selectedAsset,
        quantity: qty,
        amount: event.amount,
        status: event.status
    });
}
</script>
</body>
</html>
